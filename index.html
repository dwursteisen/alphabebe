<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AlphaBébé</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Lexend', sans-serif;
      background: #91f78e;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 1.75rem;
    }

    .nav-brand {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a3a1a;
    }

    .btn-menu {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a3a1a;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn-menu:active { transform: scale(0.88); opacity: 0.7; }

    /* ── Main ── */
    main {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem 10rem;
      gap: 2rem;
    }

    /* ── Letter cards ── */
    .word-cards {
      display: flex;
      gap: clamp(6px, 2.5vw, 20px);
      justify-content: center;
      align-items: center;
      max-width: 100%;
      overflow: visible;
      padding: 2.5rem 1rem;
    }

    .letter-card {
      background: #fff;
      border-radius: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(26, 58, 26, 0.18);
      cursor: pointer;
      width: clamp(65px, 17vw, 190px);
      height: clamp(85px, 22vw, 250px);
      flex-shrink: 0;
      transition: box-shadow 0.25s, scale 0.25s;
      scale: 1;
    }

    .letter-card.highlighted {
      box-shadow: 0 0 0 5px #fff, 0 0 0 9px rgba(26,58,26,0.5), 0 8px 32px rgba(26,58,26,0.25);
      scale: 1.12;
      z-index: 10;
    }

    .letter-card:active { opacity: 0.82; }

    .letter-card .ltr {
      font-size: clamp(2.8rem, 10vw, 11rem);
      font-weight: 900;
      line-height: 1;
    }

    /* ── Float animations ── */
    @keyframes float-1 {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50%       { transform: translateY(-15px) rotate(-2deg); }
    }
    @keyframes float-2 {
      0%, 100% { transform: translateY(0) rotate(5deg); }
      50%       { transform: translateY(-25px) rotate(8deg); }
    }
    @keyframes float-3 {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-20px) rotate(-5deg); }
    }
    @keyframes float-4 {
      0%, 100% { transform: translateY(0) rotate(3deg); }
      50%       { transform: translateY(-30px) rotate(1deg); }
    }

    .float-1 { animation: float-1 4s   ease-in-out infinite; }
    .float-2 { animation: float-2 4.5s ease-in-out infinite; }
    .float-3 { animation: float-3 3.5s ease-in-out infinite; }
    .float-4 { animation: float-4 5s   ease-in-out infinite; }

    /* ── Word image ── */
    .word-image-wrap {
      width: clamp(120px, 32vw, 220px);
      aspect-ratio: 1;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(26,58,26,0.2);
      border: 6px solid #fff;
      transform: rotate(3deg);
      transition: transform 0.5s;
      cursor: pointer;
      flex-shrink: 0;
    }
    .word-image-wrap:hover  { transform: rotate(0deg); }
    .word-image-wrap:active { transform: scale(0.94) rotate(0deg); }
    .word-image-wrap img    { width: 100%; height: 100%; object-fit: cover; }
    .word-image-wrap.hidden { display: none; }

    /* ── Word counter ── */
    .word-count {
      font-size: 0.85rem;
      color: rgba(0, 80, 16, 0.65);
      font-weight: 600;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
      padding: 0 1.5rem;
      padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
    }

    .btn-next {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: #dc2626;
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 1.25rem 2.5rem;
      width: 100%;
      max-width: 26rem;
      font-family: 'Lexend', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(220, 38, 38, 0.35);
      transition: transform 0.15s, background 0.15s;
    }
    .btn-next:hover  { background: #b91c1c; }
    .btn-next:active { transform: scale(0.96); }

    /* ── Keyboard hints ── */
    .kbd-hints {
      display: none;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.875rem;
      padding-bottom: 0.5rem;
    }
    @media (min-width: 640px) { .kbd-hints { display: flex; } }

    .kbd-hint {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: rgba(0, 80, 16, 0.7);
      font-weight: 500;
    }

    kbd {
      background: #f5f4e7;
      border: 1px solid rgba(129,129,119,0.25);
      border-radius: 6px;
      padding: 1px 7px;
      font-family: 'Lexend', sans-serif;
      font-size: 0.72rem;
      color: #373830;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }

    /* ── Empty state ── */
    .empty-state {
      color: rgba(0, 80, 16, 0.55);
      font-size: 1rem;
      text-align: center;
      padding: 1rem;
      max-width: 260px;
      line-height: 1.5;
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 58, 26, 0.35);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(6px);
    }
    @media (min-width: 640px) { .modal-overlay { align-items: center; } }
    .modal-overlay.open { display: flex; }

    .modal {
      background: #fefdf1;
      border-radius: 2rem;
      width: 100%;
      max-width: 480px;
      max-height: 88dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 48px rgba(26, 58, 26, 0.18);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem 1rem;
    }

    .modal-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a3a1a;
    }

    .btn-modal-close {
      background: #e9e9da;
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #373830;
      font-size: 1.1rem;
      transition: transform 0.1s;
    }
    .btn-modal-close:active { transform: scale(0.88); }

    /* ── Add word form ── */
    .modal-add {
      padding: 0 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    .modal-add input[type="text"] {
      width: 100%;
      font-family: 'Lexend', sans-serif;
      font-size: 1rem;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 1rem;
      background: #f5f4e7;
      color: #373830;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
    }
    .modal-add input[type="text"]:focus { background: #eeeedd; }

    .image-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-pick-image {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f5f4e7;
      border: none;
      border-radius: 1rem;
      padding: 0.65rem 1rem;
      cursor: pointer;
      font-family: 'Lexend', sans-serif;
      font-size: 0.875rem;
      color: #64655c;
      transition: background 0.15s;
      text-align: left;
      min-width: 0;
    }
    .btn-pick-image:hover { background: #eeeedd; }
    .btn-pick-image.has-image { background: #d0f0ce; color: #00600e; }
    .btn-pick-image svg { flex-shrink: 0; }
    .btn-pick-image span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    input[type="file"] { display: none; }

    /* ── Tooltip ── */
    .tooltip-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .tooltip-icon {
      width: 24px;
      height: 24px;
      background: rgba(26, 58, 26, 0.2);
      border-radius: 50%;
      border: none;
      color: #1a3a1a;
      font-size: 0.7rem;
      font-weight: 700;
      font-family: 'Lexend', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }

    .tooltip-text {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      right: 0;
      background: #373830;
      color: #fff;
      font-size: 0.75rem;
      font-family: 'Lexend', sans-serif;
      font-weight: 400;
      padding: 0.6rem 0.875rem;
      border-radius: 0.875rem;
      width: 220px;
      line-height: 1.45;
      z-index: 10;
      pointer-events: none;
    }
    .tooltip-text::after {
      content: '';
      position: absolute;
      top: 100%; right: 8px;
      border: 6px solid transparent;
      border-top-color: #373830;
    }

    .tooltip-wrap:hover .tooltip-text,
    .tooltip-wrap.open .tooltip-text { display: block; }

    /* ── Add button ── */
    .btn-add-word {
      background: #00751f;
      color: #fff;
      border: none;
      border-radius: 1rem;
      padding: 0.7rem 1.1rem;
      font-family: 'Lexend', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.1s, background 0.1s;
      flex-shrink: 0;
    }
    .btn-add-word:hover  { background: #005e17; }
    .btn-add-word:active { transform: scale(0.94); }

    /* ── Word list ── */
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 0 1.25rem;
      -webkit-overflow-scrolling: touch;
    }

    .word-item {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 0;
      border-bottom: 1px solid #f0efe0;
    }
    .word-item:last-child { border-bottom: none; }

    .word-thumb {
      width: 36px;
      height: 36px;
      border-radius: 0.5rem;
      object-fit: cover;
      flex-shrink: 0;
    }

    .word-thumb-empty {
      width: 36px;
      height: 36px;
      border-radius: 0.5rem;
      background: #e9e9da;
      flex-shrink: 0;
    }

    .word-item-text {
      flex: 1;
      font-size: 1rem;
      font-weight: 500;
      color: #373830;
      cursor: pointer;
      padding: 4px 0;
    }
    .word-item-text:active { opacity: 0.55; }

    .btn-delete {
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(196, 31, 25, 0.1);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c41f19;
      font-size: 1rem;
      flex-shrink: 0;
      transition: transform 0.1s, background 0.1s;
    }
    .btn-delete:active { transform: scale(0.88); background: rgba(196,31,25,0.2); }

    .word-list-empty {
      text-align: center;
      padding: 2rem 0;
      color: #818177;
      font-size: 0.9rem;
    }

    .modal-footer {
      padding: 0.875rem 1.25rem;
      display: flex;
      justify-content: center;
    }

    .btn-reset {
      font-family: 'Lexend', sans-serif;
      font-size: 0.825rem;
      padding: 0.5rem 1rem;
      border: 1.5px solid #babaaf;
      border-radius: 0.75rem;
      background: transparent;
      color: #818177;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-reset:active { transform: scale(0.95); }
  </style>
</head>
<body>

  <nav>
    <span class="nav-brand">Bravo&nbsp;!</span>
    <button class="btn-menu" onclick="openWordList()" title="Gérer les mots">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
  </nav>

  <main>
    <div class="word-cards" id="word-cards"></div>
    <div class="word-image-wrap hidden" id="word-image-wrap" onclick="speakWord()">
      <img id="word-image" src="" alt="">
    </div>
    <div class="word-count" id="word-count"></div>
  </main>

  <div class="bottom-bar">
    <button class="btn-next" onclick="nextWord()">
      <span>Suivant</span>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
    <div class="kbd-hints">
      <div class="kbd-hint"><kbd>Espace</kbd> Suivant</div>
      <div class="kbd-hint"><kbd>L</kbd> Lire lettre</div>
      <div class="kbd-hint"><kbd>M</kbd> Lire mot</div>
      <div class="kbd-hint"><kbd>← →</kbd> Naviguer</div>
      <div class="kbd-hint"><kbd>I</kbd> Image</div>
    </div>
  </div>

  <!-- Gestion des mots -->
  <div class="modal-overlay" id="word-modal" onclick="closeModalOnOverlay(event)">
    <div class="modal">
      <div class="modal-header">
        <h2>Liste des mots</h2>
        <button class="btn-modal-close" onclick="closeWordList()">✕</button>
      </div>

      <div class="modal-add">
        <input type="text" id="new-word-input" placeholder="Nouveau mot..." autocapitalize="none" autocomplete="off">
        <div class="image-row">
          <label class="btn-pick-image" id="image-label" for="image-file-input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <span id="image-label-text">Image (optionnel)</span>
          </label>
          <input type="file" id="image-file-input" accept="image/*">

          <div class="tooltip-wrap" id="tooltip-wrap">
            <button class="tooltip-icon" onclick="toggleTooltip(event)" type="button">?</button>
            <div class="tooltip-text">
              Trouvez des images gratuites sur <strong>flaticon.com</strong> — téléchargez l'image sur votre appareil, puis ajoutez-la ici.
            </div>
          </div>

          <button class="btn-add-word" onclick="addWord()">Ajouter</button>
        </div>
      </div>

      <div class="modal-body" id="word-list-body"></div>

      <div class="modal-footer">
        <button class="btn-reset" onclick="resetWords()">Remettre les mots par défaut</button>
      </div>
    </div>
  </div>

  <script>
    // ── Données par défaut ──
    const DEFAULT_WORDS = [
      { text: 'lion',   image: null },
      { text: 'chat',   image: null },
      { text: 'chien',  image: null },
      { text: 'lune',   image: null },
      { text: 'papa',   image: null },
      { text: 'mama',   image: null },
      { text: 'bébé',   image: null },
      { text: 'arbre',  image: null },
      { text: 'avion',  image: null },
      { text: 'maison', image: null },
      { text: 'pomme',  image: null },
      { text: 'lapin',  image: null },
      { text: 'soleil', image: null },
      { text: 'banane', image: null },
      { text: 'souris', image: null },
      { text: 'vélo',   image: null },
      { text: 'ours',   image: null },
      { text: 'rose',   image: null },
    ];

    const STORAGE_KEY = 'alphabebe-words-v2';

    const COLORS = {
      a: '#E63946', b: '#457B9D', c: '#F4A261', d: '#7B2D8E',
      e: '#2D936C', f: '#E91E8C', g: '#0B7A75', h: '#FF6B6B',
      i: '#3D5A80', j: '#E6A817', k: '#C1121F', l: '#588B00',
      m: '#C20088', n: '#1D3557', o: '#F77F00', p: '#9B5DE5',
      q: '#6B7F2E', r: '#E84393', s: '#00B4D8', t: '#00998F',
      u: '#D35400', v: '#740AFF', w: '#8B1A4A', x: '#4A6670',
      y: '#E9C46A', z: '#FF5733'
    };

    const FLOAT_CLASSES = ['float-1', 'float-2', 'float-3', 'float-4'];

    // ── État ──
    let words = [];
    let currentWordIndex = 0;
    let currentLetterIndex = -1;
    let imageVisible = true;
    let pendingImage = null;
    let modalOpen = false;
    let voices = [];

    // ── Chargement ──
    function loadWords() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          // Compatibilité avec l'ancien format (chaînes simples)
          return parsed.map(w => typeof w === 'string' ? { text: w, image: null } : w);
        } catch (e) { /* ignoré */ }
      }
      return DEFAULT_WORDS.map(w => ({ ...w }));
    }

    function saveWords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
    }

    // ── Couleurs ──
    function baseChar(c) {
      return c.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
    }

    function colorFor(c) {
      return COLORS[baseChar(c)] || '#64655c';
    }

    // ── Synthèse vocale ──
    speechSynthesis.addEventListener('voiceschanged', () => {
      voices = speechSynthesis.getVoices();
    });
    voices = speechSynthesis.getVoices();

    function speak(text) {
      speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'fr-FR';
      utt.rate = 0.85;
      const frVoice = voices.find(v => v.lang.startsWith('fr'));
      if (frVoice) utt.voice = frVoice;
      speechSynthesis.speak(utt);
    }

    function speakWord() {
      if (words.length > 0) speak(words[currentWordIndex].text);
    }

    function speakCurrentLetter() {
      if (words.length === 0) return;
      const text = words[currentWordIndex].text;
      const idx = currentLetterIndex >= 0 ? currentLetterIndex : 0;
      if (idx < text.length) speak(text[idx].toLowerCase());
    }

    // ── Affichage ──
    let renderedWordIndex = -1; // track which word is currently in the DOM

    function renderWord() {
      const container = document.getElementById('word-cards');

      if (words.length === 0) {
        container.innerHTML = '<p class="empty-state">Aucun mot — ouvrez le menu pour en ajouter&nbsp;!</p>';
        document.getElementById('word-image-wrap').classList.add('hidden');
        document.getElementById('word-count').textContent = '';
        renderedWordIndex = -1;
        return;
      }

      if (currentWordIndex >= words.length) currentWordIndex = words.length - 1;
      const word = words[currentWordIndex];

      // Only rebuild DOM when the word itself changed
      if (renderedWordIndex !== currentWordIndex) {
        container.innerHTML = '';

        word.text.split('').forEach((ch, i) => {
          const card = document.createElement('div');
          card.className = `letter-card ${FLOAT_CLASSES[i % 4]}`;

          const span = document.createElement('span');
          span.className = 'ltr';
          span.textContent = ch.toUpperCase();
          span.style.color = colorFor(ch);

          card.appendChild(span);
          card.addEventListener('click', () => {
            currentLetterIndex = i;
            speak(ch.toLowerCase());
            updateHighlight();
          });
          container.appendChild(card);
        });

        renderedWordIndex = currentWordIndex;
      }

      updateHighlight();

      // Image
      const imgWrap = document.getElementById('word-image-wrap');
      const img = document.getElementById('word-image');
      if (word.image && imageVisible) {
        img.src = word.image;
        img.alt = word.text;
        imgWrap.classList.remove('hidden');
      } else {
        imgWrap.classList.add('hidden');
      }

      document.getElementById('word-count').textContent =
        `${currentWordIndex + 1} / ${words.length}`;
    }

    function updateHighlight() {
      const cards = document.getElementById('word-cards').querySelectorAll('.letter-card');
      cards.forEach((card, i) => {
        card.classList.toggle('highlighted', i === currentLetterIndex);
      });
    }

    // ── Navigation ──
    function nextWord() {
      if (words.length === 0) return;
      currentWordIndex = (currentWordIndex + 1) % words.length;
      currentLetterIndex = -1;
      renderWord();
    }

    function prevWord() {
      if (words.length === 0) return;
      currentWordIndex = (currentWordIndex - 1 + words.length) % words.length;
      currentLetterIndex = -1;
      renderWord();
    }

    // ── Sélection d'image ──
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('image-file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) { pendingImage = null; return; }

        const reader = new FileReader();
        reader.onload = (evt) => {
          pendingImage = evt.target.result; // stockage en base64
          const label = document.getElementById('image-label');
          const labelText = document.getElementById('image-label-text');
          const name = file.name.length > 22 ? file.name.slice(0, 20) + '…' : file.name;
          labelText.textContent = name;
          label.classList.add('has-image');
        };
        reader.readAsDataURL(file);
      });

      document.getElementById('new-word-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') addWord();
      });
    });

    // ── Gestion des mots ──
    function addWord() {
      const input = document.getElementById('new-word-input');
      const text = input.value.trim().toLowerCase();
      if (!text) return;
      if (words.some(w => w.text === text)) {
        input.value = '';
        return;
      }

      words.push({ text, image: pendingImage });
      saveWords();
      resetAddForm();
      renderWordList();
      renderWord();
    }

    function resetAddForm() {
      document.getElementById('new-word-input').value = '';
      document.getElementById('image-file-input').value = '';
      document.getElementById('image-label-text').textContent = 'Image (optionnel)';
      document.getElementById('image-label').classList.remove('has-image');
      pendingImage = null;
    }

    function removeWord(index) {
      words.splice(index, 1);
      if (currentWordIndex >= words.length) currentWordIndex = Math.max(0, words.length - 1);
      renderedWordIndex = -1; // force full rebuild
      saveWords();
      renderWordList();
      renderWord();
    }

    function selectWord(index) {
      currentWordIndex = index;
      currentLetterIndex = -1;
      closeWordList();
      renderWord();
    }

    function resetWords() {
      words = DEFAULT_WORDS.map(w => ({ ...w }));
      currentWordIndex = 0;
      currentLetterIndex = -1;
      saveWords();
      renderWordList();
      renderWord();
    }

    function renderWordList() {
      const body = document.getElementById('word-list-body');
      if (words.length === 0) {
        body.innerHTML = '<div class="word-list-empty">Aucun mot dans la liste</div>';
        return;
      }
      body.innerHTML = '';
      words.forEach((w, i) => {
        const item = document.createElement('div');
        item.className = 'word-item';

        if (w.image) {
          const thumb = document.createElement('img');
          thumb.className = 'word-thumb';
          thumb.src = w.image;
          thumb.alt = w.text;
          item.appendChild(thumb);
        } else {
          const ph = document.createElement('div');
          ph.className = 'word-thumb-empty';
          item.appendChild(ph);
        }

        const label = document.createElement('span');
        label.className = 'word-item-text';
        label.textContent = w.text;
        label.onclick = () => selectWord(i);
        item.appendChild(label);

        const del = document.createElement('button');
        del.className = 'btn-delete';
        del.textContent = '✕';
        del.onclick = () => removeWord(i);
        item.appendChild(del);

        body.appendChild(item);
      });
    }

    // ── Modal ──
    function openWordList() {
      renderWordList();
      document.getElementById('word-modal').classList.add('open');
      modalOpen = true;
    }

    function closeWordList() {
      document.getElementById('word-modal').classList.remove('open');
      modalOpen = false;
    }

    function closeModalOnOverlay(e) {
      if (e.target === e.currentTarget) closeWordList();
    }

    // ── Tooltip (mobile : tap pour ouvrir/fermer) ──
    function toggleTooltip(e) {
      e.stopPropagation();
      document.getElementById('tooltip-wrap').classList.toggle('open');
    }

    document.addEventListener('click', () => {
      document.getElementById('tooltip-wrap').classList.remove('open');
    });

    // ── Clavier ──
    document.addEventListener('keydown', (e) => {
      if (modalOpen || e.target.tagName === 'INPUT') return;
      if (words.length === 0) return;

      const len = words[currentWordIndex].text.length;

      switch (e.key) {
        case ' ':
          e.preventDefault();
          nextWord();
          break;
        case 'ArrowRight':
          e.preventDefault();
          currentLetterIndex = currentLetterIndex < len - 1 ? currentLetterIndex + 1 : 0;
          updateHighlight();
          break;
        case 'ArrowLeft':
          e.preventDefault();
          currentLetterIndex = currentLetterIndex > 0 ? currentLetterIndex - 1 : len - 1;
          updateHighlight();
          break;
        case 'ArrowUp':
          e.preventDefault();
          prevWord();
          break;
        case 'ArrowDown':
          e.preventDefault();
          nextWord();
          break;
        case 'l': case 'L':
          e.preventDefault();
          speakCurrentLetter();
          break;
        case 'm': case 'M':
          e.preventDefault();
          speakWord();
          break;
        case 'i': case 'I':
          e.preventDefault();
          imageVisible = !imageVisible;
          renderWord();
          break;
      }
    });

    // ── Initialisation ──
    words = loadWords();
    renderWord();
  </script>
</body>
</html>
